<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logoGradient" x1="40" y1="40" x2="216" y2="216" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2D89FF"/> <!-- Blue (Analysis) -->
      <stop offset="0.5" stop-color="#7C4DFF"/> <!-- Purple (Intelligence) -->
      <stop offset="1" stop-color="#FF5252"/> <!-- Red/Orange (Emotion) -->
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
      <feOffset dx="0" dy="4"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.2"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Main Brain Shape (Stylized/Abstract) -->
  <g filter="url(#shadow)">
    <!-- Right side -->
    <path d="M128 40C165.558 40 196 70.4416 196 108C196 130.8 184.8 150.8 167.2 163.2C178.4 176 186.4 192.8 186.4 211.2C186.4 214.4 186 217.2 185.6 220H153.6C148.8 206 137.6 196 124 196" stroke="url(#logoGradient)" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    
    <!-- Left side -->
    <path d="M128 40C90.4416 40 60 70.4416 60 108C60 130.8 71.2 150.8 88.8 163.2C77.6 176 69.6 192.8 69.6 211.2C69.6 214.4 70 217.2 70.4 220H102.4C107.2 206 118.4 196 132 196" stroke="url(#logoGradient)" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

    <!-- The 'Smile' Pulse (Neural Link) -->
    <path d="M96 136C112 152 144 152 160 136" stroke="url(#logoGradient)" stroke-width="12" stroke-linecap="round" fill="none"/>
    
    <!-- Analysis Nodes -->
    <circle cx="128" cy="80" r="8" fill="url(#logoGradient)"/>
    <circle cx="160" cy="108" r="6" fill="url(#logoGradient)"/>
    <circle cx="96" cy="108" r="6" fill="url(#logoGradient)"/>
  </g>
</svg>
