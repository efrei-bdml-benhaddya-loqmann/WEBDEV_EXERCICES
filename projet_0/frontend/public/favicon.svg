<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 80">
  <defs>
    <linearGradient id="maskGradient" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" style="stop-color:#3182ce;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#4a148c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e53e3e;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Left Mask (Comedy) -->
  <g transform="translate(5, 5) rotate(-5, 45, 40)">
    <path d="M10,20 C15,10 35,10 45,20 L42,65 C35,75 15,75 8,65 Z" fill="white" stroke="url(#maskGradient)" stroke-width="5" stroke-linejoin="round"/>
    <!-- Eyes -->
    <path d="M18,35 C20,30 25,30 27,35" fill="none" stroke="#1a202c" stroke-width="3.5" stroke-linecap="round"/>
    <path d="M30,35 C32,30 37,30 39,35" fill="none" stroke="#1a202c" stroke-width="3.5" stroke-linecap="round"/>
    <!-- Mouth -->
    <path d="M20,52 C25,58 32,58 37,52" fill="none" stroke="#1a202c" stroke-width="3.5" stroke-linecap="round"/>
  </g>

  <!-- Right Mask (Tragedy) -->
  <g transform="translate(45, 12) rotate(5, 45, 40)">
    <path d="M10,20 C15,10 35,10 45,20 L42,65 C35,75 15,75 8,65 Z" fill="white" stroke="url(#maskGradient)" stroke-width="5" stroke-linejoin="round"/>
    <!-- Eyes -->
    <path d="M15,40 C17,45 22,45 24,40" fill="none" stroke="#1a202c" stroke-width="3.5" stroke-linecap="round"/>
    <path d="M31,40 C33,45 38,45 40,40" fill="none" stroke="#1a202c" stroke-width="3.5" stroke-linecap="round"/>
    <!-- Mouth -->
    <path d="M18,60 C23,54 32,54 37,60" fill="none" stroke="#1a202c" stroke-width="3.5" stroke-linecap="round"/>
  </g>
</svg>
